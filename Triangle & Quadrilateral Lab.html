<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triangle & Quadrilateral Lab</title>
<style>
  body {
    font-family: 'Comic Sans MS', cursive, sans-serif;
    background: linear-gradient(to bottom right, #a1c4fd, #c2e9fb);
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }
  .container {
    background: #fff;
    border-radius: 20px;
    padding: 20px;
    width: 90%;
    max-width: 900px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  }
  h1 {
    text-align: center;
    color: #333;
  }
  .tabs {
    display: flex;
    justify-content: center;
    margin-bottom: 10px;
    gap: 10px;
  }
  .tab {
    padding: 10px 20px;
    background: #f1f1f1;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.3s;
  }
  .tab.active {
    background: #4facfe;
    color: #fff;
  }
  .tab:hover {
    transform: translateY(-2px);
    box-shadow: 2px 4px 8px rgba(0,0,0,0.2);
  }
  .tab-content {
    display: none;
  }
  .tab-content.active {
    display: block;
  }
  .tab-heading {
    font-size: 1.2em;
    font-weight: bold;
    color: #4b3c8a;
    text-align: center;
    margin-bottom: 10px;
  }
  .input-group {
    margin: 10px 0;
  }
  .input-group label {
    display: inline-block;
    width: 120px;
  }
  .input-group input {
    width: 60px;
    padding: 5px;
    border-radius: 10px;
    border: 1px solid #ccc;
  }
  .buttons {
    margin-top: 15px;
    display: flex;
    gap: 10px;
  }
  .btn {
    padding: 10px 20px;
    border-radius: 15px;
    border: none;
    cursor: pointer;
    background: #4facfe;
    color: #fff;
    font-weight: bold;
    transition: 0.3s;
  }
  .btn:hover {
    transform: translateY(-3px);
    box-shadow: 3px 6px 10px rgba(0,0,0,0.3);
  }
  .result {
    margin-top: 15px;
    background: #e8f0fe;
    padding: 15px;
    border-radius: 15px;
  }
  .result .remaining {
    font-weight: bold;
    color: green;
  }
  .diagram-container {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  svg {
    max-width: 200px;
  }
  footer {
    text-align: center;
    margin-top: 20px;
    font-size: 0.9em;
    line-height: 1.5;
    color: #333;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Triangle & Quadrilateral Lab</h1>

  <div class="tabs">
    <div class="tab active" onclick="showTab('triangle')">Triangle Explorer</div>
    <div class="tab" onclick="showTab('quadrilateral')">Quadrilateral Explorer</div>
  </div>

  <!-- Triangle Tab -->
  <div id="triangle" class="tab-content active">
    <div class="tab-heading">Find the Missing Angle and Identify the Triangle Type</div>
    <div class="input-group">
      <label>Angle 1 (°):</label>
      <input type="number" id="tri-angle1" min="1" max="179">
    </div>
    <div class="input-group">
      <label>Angle 2 (°):</label>
      <input type="number" id="tri-angle2" min="1" max="179">
    </div>
    <div class="buttons">
      <button class="btn" onclick="calculateTriangle()">Calculate</button>
      <button class="btn" onclick="resetTriangle()">Reset</button>
    </div>
    <div id="tri-result" class="result"></div>
    <div id="tri-diagram" class="diagram-container"></div>
  </div>

  <!-- Quadrilateral Tab -->
  <div id="quadrilateral" class="tab-content">
    <div class="tab-heading">Find the Missing Angle and Identify the Quadrilateral Type</div>
    <div class="input-group">
      <label>Angle 1 (°):</label>
      <input type="number" id="quad-angle1" min="1" max="359">
    </div>
    <div class="input-group">
      <label>Angle 2 (°):</label>
      <input type="number" id="quad-angle2" min="1" max="359">
    </div>
    <div class="input-group">
      <label>Angle 3 (°):</label>
      <input type="number" id="quad-angle3" min="1" max="359">
    </div>
    <div class="buttons">
      <button class="btn" onclick="calculateQuadrilateral()">Calculate</button>
      <button class="btn" onclick="resetQuadrilateral()">Reset</button>
    </div>
    <div id="quad-result" class="result"></div>
    <div id="quad-diagram" class="diagram-container"></div>
  </div>

  <footer>
    Explore the magic of angles and shapes!<br>
    Designed for curious kids by Satish B<br>
    Contact: Satishb.iyer@gmail.com
  </footer>
</div>

<script>
function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelector(`.tab[onclick="showTab('${tab}')"]`).classList.add('active');
  document.getElementById(tab).classList.add('active');
}

// Triangle Calculation
function calculateTriangle() {
  const a1 = Number(document.getElementById('tri-angle1').value);
  const a2 = Number(document.getElementById('tri-angle2').value);
  const resultDiv = document.getElementById('tri-result');
  const diagramDiv = document.getElementById('tri-diagram');
  diagramDiv.innerHTML = '';
  
  if(a1<=0 || a2<=0 || a1>=180 || a2>=180) {
    resultDiv.innerHTML = "Enter valid angles between 1 and 179.";
    return;
  }
  if(a1 + a2 >= 180) {
    resultDiv.innerHTML = "Sum of two angles must be less than 180°.";
    return;
  }

  const sumGiven = a1 + a2;
  const a3 = 180 - sumGiven;

  let type = '';
  if(a1===60 && a2===60 && a3===60) type = "Equilateral Triangle";
  else if(a1===a2 || a2===a3 || a1===a3) type = "Isosceles Triangle";
  else if(a1===90 || a2===90 || a3===90) type = "Right-angled Triangle";
  else type = "Scalene Triangle";

  resultDiv.innerHTML = `
    Total angles in a triangle = 180°<br>
    Sum of given angles = ${a1} + ${a2} = ${sumGiven}<br>
    Remaining angle = 180 – ${sumGiven} = <span class="remaining">${a3}°</span><br>
    Type: ${type}
  `;

  // Triangle diagram
  let svg = '';
  if(type==='Right-angled Triangle') svg = `<svg width="200" height="150"><polygon points="10,130 10,10 150,130" fill="#ffd966" stroke="#000" stroke-width="2"/></svg>`;
  else if(type==='Equilateral Triangle') svg = `<svg width="200" height="150"><polygon points="100,10 10,130 190,130" fill="#a4c2f4" stroke="#000" stroke-width="2"/></svg>`;
  else if(type==='Isosceles Triangle') svg = `<svg width="200" height="150"><polygon points="100,10 30,130 170,130" fill="#ff9999" stroke="#000" stroke-width="2"/></svg>`;
  else svg = `<svg width="200" height="150"><polygon points="10,130 50,20 180,120" fill="#99ff99" stroke="#000" stroke-width="2"/></svg>`;
  
  diagramDiv.innerHTML = svg;
}

function resetTriangle() {
  document.getElementById('tri-angle1').value = '';
  document.getElementById('tri-angle2').value = '';
  document.getElementById('tri-result').innerHTML = '';
  document.getElementById('tri-diagram').innerHTML = '';
}

// Quadrilateral Calculation
function calculateQuadrilateral() {
  const a1 = Number(document.getElementById('quad-angle1').value);
  const a2 = Number(document.getElementById('quad-angle2').value);
  const a3 = Number(document.getElementById('quad-angle3').value);
  const resultDiv = document.getElementById('quad-result');
  const diagramDiv = document.getElementById('quad-diagram');
  diagramDiv.innerHTML = '';
  
  if(a1<=0 || a2<=0 || a3<=0 || a1>=360 || a2>=360 || a3>=360) {
    resultDiv.innerHTML = "Enter valid angles between 1 and 359.";
    return;
  }
  if(a1 + a2 + a3 >= 360) {
    resultDiv.innerHTML = "Sum of three angles must be less than 360°.";
    return;
  }

  const sumGiven = a1 + a2 + a3;
  const a4 = 360 - sumGiven;

  let type = "General Quadrilateral";
  let diagrams = [];
  if(a1===90 && a2===90 && a3===90 && a4===90) {
    type = "Square OR Rectangle";
    diagrams.push(`<svg width="150" height="150"><rect x="20" y="20" width="120" height="120" fill="#ffd966" stroke="#000" stroke-width="2"/></svg>`);
    diagrams.push(`<svg width="150" height="120"><rect x="20" y="30" width="160" height="80" fill="#a4c2f4" stroke="#000" stroke-width="2"/></svg>`);
  } else if(a1===a3 && a2===a4) {
    type = "Parallelogram";
    diagrams.push(`<svg width="200" height="150"><polygon points="30,120 60,30 180,30 150,120" fill="#ff9999" stroke="#000" stroke-width="2"/></svg>`);
  } else if(a1===a2 && a2===a3 && a3===a4) {
    type = "Rhombus-like";
    diagrams.push(`<svg width="200" height="150"><polygon points="100,20 180,70 100,130 20,70" fill="#99ff99" stroke="#000" stroke-width="2"/></svg>`);
  } else {
    diagrams.push(`<svg width="200" height="150"><polygon points="30,120 50,30 180,50 150,130" fill="#ffccff" stroke="#000" stroke-width="2"/></svg>`);
  }

  resultDiv.innerHTML = `
    Total angles in a quadrilateral = 360°<br>
    Sum of given angles = ${a1} + ${a2} + ${a3} = ${sumGiven}<br>
    Remaining angle = 360 – ${sumGiven} = <span class="remaining">${a4}°</span><br>
    Type: ${type}
  `;

  diagramDiv.innerHTML = diagrams.join(' OR ');
}

function resetQuadrilateral() {
  document.getElementById('quad-angle1').value = '';
  document.getElementById('quad-angle2').value = '';
  document.getElementById('quad-angle3').value = '';
  document.getElementById('quad-result').innerHTML = '';
  document.getElementById('quad-diagram').innerHTML = '';
}
</script>
</body>
</html>
