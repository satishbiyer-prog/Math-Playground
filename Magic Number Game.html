<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Number Game</title>

    <!-- Google Fonts: Baloo 2 -->
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Baloo 2', cursive;
            font-size: 16px;
            text-align: center;
            background-color: #f0f8ff;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #ffcc00;
            padding: 20px;
        }

        h1 {
            margin: 0;
            font-size: 36px;
        }

        header p {
            font-size: 18px;
            margin-top: 8px;
        }

        main {
            padding: 50px 20px;
        }

        button {
            font-family: 'Baloo 2', cursive;
            font-size: 20px;
            padding: 10px 20px;
            margin: 20px;
            cursor: pointer;
            border-radius: 10px;
            border: none;
            background-color: #ff9999;
        }

        .step {
            font-size: 22px;
            margin: 20px 0;
            color: #333;
        }

        footer {
            background-color: #ffcc00;
            padding: 20px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        footer p {
            margin: 5px 0;
            font-size: 16px;
        }

        /* Mobile responsiveness */
        @media (max-width:480px){
            h1 { font-size: 28px; }
            header p { font-size: 16px; }
            .step { font-size: 18px; }
            button { font-size: 18px; padding: 8px 16px; margin: 15px 5px; }
            footer p { font-size: 14px; }
            main { padding: 30px 10px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Magic Number Game</h1>
        <p>Follow the steps and see the magic happen!</p>
    </header>

    <main>
        <div id="instructions">
            <p class="step" id="stepText">🤔 Think of a secret number between 1 and 20...</p>
            <button id="nextBtn">Next ✨</button>
        </div>
    </main>

    <footer>
        <p>Enjoy the magic of numbers and have fun learning math tricks!</p>
        <p><strong>Designed for curious kids by Satish B</strong></p>
        <p>Contact: Satishb.iyer@gmail.com</p>
    </footer>

    <script>
        const evenNumbers = [4, 6, 8, 12];

        function startGame() {
            const addedNumber = evenNumbers[Math.floor(Math.random() * evenNumbers.length)];
            const magicNumber = addedNumber / 2;

            const steps = [
                "🤔 Think of a secret number between 1 and 20...",
                "✌️ Double it! Imagine it growing bigger...",
                `➕ Add ${addedNumber} to your number. Give it a little boost!`,
                "✂️ Divide the total by 2. Whoa, it's shrinking now!",
                "➖ Subtract your original number. Almost there!",
                `🎩 Abracadabra! You are left with ${magicNumber}! 🪄`
            ];

            let currentStep = 0;
            const stepText = document.getElementById("stepText");
            const nextBtn = document.getElementById("nextBtn");

            const oldAgainBtn = document.getElementById("againBtn");
            if(oldAgainBtn) oldAgainBtn.remove();

            stepText.textContent = steps[currentStep];
            nextBtn.style.display = "inline-block";

            nextBtn.onclick = () => {
                currentStep++;
                if (currentStep < steps.length) {
                    stepText.textContent = steps[currentStep];
                    if(currentStep === steps.length - 1){
                        nextBtn.style.display = "none";

                        const againBtn = document.createElement("button");
                        againBtn.id = "againBtn";
                        againBtn.textContent = "Try Again 🔄";
                        againBtn.onclick = startGame;
                        document.getElementById("instructions").appendChild(againBtn);
                    }
                }
            };
        }

        startGame();
    </script>
</body>
</html>
